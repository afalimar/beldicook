<!DOCTYPE html>
<html>
<head>
  <title>Test Supabase Connection</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    h1 { color: #333; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
    pre { background: #f4f4f4; padding: 15px; border-radius: 8px; overflow-x: auto; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>🧪 Supabase Connection Test</h1>

  <p>Baddel SUPABASE_URL ou SUPABASE_ANON_KEY b'keys dyalek qbel ma t-khdem.</p>

  <button onclick="testMenu()">Test: Fetch Menu</button>
  <button onclick="testIngredients()">Test: Fetch Stock</button>
  <button onclick="testLowStock()">Test: Low Stock Alerts</button>
  <button onclick="testProfitability()">Test: Menu Profitability</button>

  <h3>Result:</h3>
  <pre id="output">Click chi button bach t-jarreb...</pre>

  <script>
    // ⚠️ BADDEL HADOU 2 B'VALEURS DYALEK
    const SUPABASE_URL = 'https://xxxxxx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIs...';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const out = document.getElementById('output');

    function display(data, error) {
      if (error) {
        out.innerHTML = '<span class="error">❌ ERROR:\n' +
          JSON.stringify(error, null, 2) + '</span>';
      } else {
        out.innerHTML = '<span class="success">✅ SUCCESS (' +
          data.length + ' rows):\n' + JSON.stringify(data, null, 2) + '</span>';
      }
    }

    async function testMenu() {
      const { data, error } = await supabase
        .from('menu_items')
        .select('name, category, price');
      display(data, error);
    }

    async function testIngredients() {
      const { data, error } = await supabase
        .from('ingredients')
        .select('name, current_stock, min_stock, unit');
      display(data, error);
    }

    async function testLowStock() {
      const { data, error } = await supabase
        .from('v_low_stock_alerts')
        .select('*');
      display(data, error);
    }

    async function testProfitability() {
      const { data, error } = await supabase
        .from('v_menu_profitability')
        .select('*');
      display(data, error);
    }
  </script>
</body>
</html>
