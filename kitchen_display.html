<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Display - Beldi Cook</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a1f4a;color:#fff;min-height:100vh;}
  
  .header{background:#1a3a8a;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #FFD800;}
  .logo-block{display:flex;align-items:center;gap:10px;}
  .logo-circle{width:38px;height:38px;background:#FFD800;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;color:#1a3a8a;font-size:16px;font-family:"Brush Script MT",cursive;}
  .header h1{font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;}
  .header-sub{font-size:11px;color:#FFD800;}
  .live-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  .header-right{display:flex;gap:10px;align-items:center;font-size:12px;color:rgba(255,255,255,0.7);}
  
  .stats{display:flex;gap:8px;padding:12px 20px;background:#0a1f4a;border-bottom:1px solid #1a3a8a;}
  .stat{flex:1;padding:10px;border-radius:8px;text-align:center;}
  .stat .num{font-size:22px;font-weight:500;}
  .stat .lbl{font-size:11px;margin-top:2px;}
  .stat.pending{background:#FFD800;color:#1a3a8a;}
  .stat.preparing{background:#fff;color:#1a3a8a;}
  .stat.ready{background:#1D9E75;color:#fff;}
  
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:16px;}
  
  .card{border-radius:10px;padding:14px;display:flex;flex-direction:column;animation:slideIn .3s;}
  @keyframes slideIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .card.new{background:#1a3a8a;border-left:4px solid #FFD800;animation:flash .5s 3;}
  @keyframes flash{0%,100%{background:#1a3a8a;}50%{background:#2a4a9a;}}
  .card.preparing{background:#1a3a8a;border-left:4px solid #fff;}
  .card.ready{background:#0a4a35;border-left:4px solid #1D9E75;}
  
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.2);}
  .card-num{font-size:22px;font-weight:500;color:#fff;}
  .card-type{font-size:10px;padding:3px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:0.5px;font-weight:500;}
  .card-type.delivery{background:#FFD800;color:#1a3a8a;}
  .card-type.dine_in{background:#fff;color:#1a3a8a;}
  .card-type.takeaway{background:#1D9E75;color:#fff;}
  
  .card-timer{font-size:12px;color:#FFD800;margin-bottom:10px;}
  .card-timer.warn{color:#EF9F27;font-weight:500;}
  .card-timer.late{color:#E24B4A;font-weight:500;animation:shake 0.5s infinite;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-2px);}75%{transform:translateX(2px);}}
  
  .card-customer{background:rgba(0,0,0,0.2);padding:8px;border-radius:6px;font-size:11px;margin-bottom:10px;}
  .card-customer div{padding:1px 0;}
  
  .items{flex:1;margin-bottom:12px;}
  .item{display:flex;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.1);}
  .item:last-child{border-bottom:none;}
  .item-qty{min-width:30px;font-weight:500;color:#FFD800;}
  .ready .item-qty{color:#1D9E75;}
  .item-name{flex:1;}
  .item-note{font-size:11px;color:#888;margin-top:2px;padding-left:30px;font-style:italic;}
  
  .card-notes{font-size:12px;color:#FFD800;background:rgba(255,216,0,0.1);padding:8px 10px;border-radius:6px;margin-bottom:10px;border-left:2px solid #FFD800;}
  
  .actions{display:flex;gap:5px;}
  .action-btn{flex:1;padding:10px;border:none;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;}
  .btn-prepare{background:#FFD800;color:#1a3a8a;}
  .btn-prepare-blue{background:#fff;color:#1a3a8a;}
  .btn-ready{background:#1D9E75;color:#fff;}
  
  .empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:#888;}
  .empty-state h2{font-size:18px;font-weight:400;margin-bottom:8px;}
  
  .notification{position:fixed;top:20px;right:20px;background:#FFD800;color:#1a3a8a;padding:14px 20px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.5);z-index:100;animation:slideInRight .3s;max-width:320px;}
  @keyframes slideInRight{from{transform:translateX(120%);}to{transform:translateX(0);}}
  
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal{background:#1a3a8a;border-radius:12px;padding:24px;max-width:440px;width:100%;color:#fff;}
  .modal h2{font-size:18px;margin-bottom:8px;color:#FFD800;}
  .modal p{font-size:13px;color:rgba(255,255,255,0.8);margin-bottom:16px;}
  .modal label{font-size:12px;color:#FFD800;display:block;margin-bottom:4px;}
  .modal input{width:100%;padding:10px;background:#0a1f4a;border:1px solid #2a4a9a;color:#fff;border-radius:8px;font-size:13px;font-family:monospace;margin-bottom:10px;}
  .modal button{width:100%;padding:12px;background:#FFD800;color:#1a3a8a;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;}
  
  .sound-toggle{background:#0a1f4a;border:1px solid #2a4a9a;color:#FFD800;padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;}
  .sound-toggle.off{color:#666;}
</style>
</head>
<body>

<div class="modal-bg" id="configModal" style="display:none;">
  <div class="modal">
    <h2>🍳 Kitchen Display Setup</h2>
    <p>Dkhol info dyal Supabase:</p>
    <label>Supabase URL</label>
    <input type="text" id="urlInput" placeholder="https://xxxxxx.supabase.co">
    <label>Anon Key</label>
    <input type="text" id="keyInput" placeholder="eyJhbGc...">
    <button onclick="saveConfig()">Connect</button>
  </div>
</div>

<div class="header">
  <div class="logo-block">
    <div class="logo-circle">B</div>
    <div>
      <h1>🍳 Kitchen <span class="live-dot"></span> LIVE</h1>
      <div class="header-sub">Beldi Cook · Couzina</div>
    </div>
  </div>
  <div class="header-right">
    <button class="sound-toggle" id="soundBtn" onclick="toggleSound()">🔔 Son: ON</button>
    <span id="clock">—</span>
    <button class="sound-toggle" onclick="resetConfig()">⚙️</button>
  </div>
</div>

<div class="stats">
  <div class="stat pending"><div class="num" id="countPending">0</div><div class="lbl">Jdid</div></div>
  <div class="stat preparing"><div class="num" id="countPreparing">0</div><div class="lbl">Kay-tsa(h)et</div></div>
  <div class="stat ready"><div class="num" id="countReady">0</div><div class="lbl">Wjed</div></div>
</div>

<div class="grid" id="grid">
  <div class="empty-state"><h2>Loading...</h2></div>
</div>

<script>
let supabase = null;
let config = { url: localStorage.getItem('sb_url'), key: localStorage.getItem('sb_key'), restaurantId: '11111111-1111-1111-1111-111111111111' };
let orders = [];
let soundEnabled = true;
let audioCtx = null;

function init() {
  if (!config.url || !config.key) { document.getElementById('configModal').style.display = 'flex'; return; }
  try {
    supabase = window.supabase.createClient(config.url, config.key);
    loadOrders();
    subscribeToChanges();
    startClock();
    setInterval(updateTimers, 10000);
  } catch (e) { document.getElementById('configModal').style.display = 'flex'; }
}

function saveConfig() {
  const url = document.getElementById('urlInput').value.trim();
  const key = document.getElementById('keyInput').value.trim();
  if (!url || !key) return;
  localStorage.setItem('sb_url', url); localStorage.setItem('sb_key', key);
  config.url = url; config.key = key;
  document.getElementById('configModal').style.display = 'none';
  init();
}

function resetConfig() {
  if (confirm('Reset config?')) { localStorage.clear(); location.reload(); }
}

async function loadOrders() {
  try {
    const { data, error } = await supabase.from('orders').select(`*, order_items (quantity, special_notes, menu_items ( name ))`).eq('restaurant_id', config.restaurantId).in('status', ['accepted', 'preparing', 'ready']).order('created_at', { ascending: true });
    if (error) throw error;
    orders = data || [];
    render();
  } catch (e) { console.error(e); }
}

function subscribeToChanges() {
  supabase.channel('kitchen-orders').on('postgres_changes', { event: '*', schema: 'public', table: 'orders', filter: `restaurant_id=eq.${config.restaurantId}` }, (payload) => handleRealtimeChange(payload)).subscribe();
}

async function handleRealtimeChange(payload) {
  if (payload.eventType === 'UPDATE') {
    const updated = payload.new;
    const old = payload.old;
    if (updated.status === 'accepted' && old.status === 'pending') {
      await loadOrders();
      playNotification();
      showToast(`🔔 Commande jdida #${updated.order_number}!`, updated.total + ' MAD');
    } else if (['accepted', 'preparing', 'ready'].includes(updated.status)) {
      await loadOrders();
    } else if (['delivered', 'cancelled'].includes(updated.status)) {
      orders = orders.filter(o => o.id !== updated.id);
      render();
    }
  }
}

function render() {
  const grid = document.getElementById('grid');
  const pending = orders.filter(o => o.status === 'accepted');
  const preparing = orders.filter(o => o.status === 'preparing');
  const ready = orders.filter(o => o.status === 'ready');
  document.getElementById('countPending').textContent = pending.length;
  document.getElementById('countPreparing').textContent = preparing.length;
  document.getElementById('countReady').textContent = ready.length;
  if (orders.length === 0) {
    grid.innerHTML = `<div class="empty-state"><h2>✨ Couzina clean!</h2><p>Stenna commandes jdad...</p></div>`;
    return;
  }
  const statusOrder = { 'accepted': 0, 'preparing': 1, 'ready': 2 };
  const sorted = [...orders].sort((a, b) => {
    const diff = statusOrder[a.status] - statusOrder[b.status];
    if (diff !== 0) return diff;
    return new Date(a.created_at) - new Date(b.created_at);
  });
  grid.innerHTML = sorted.map(o => renderCard(o)).join('');
}

function renderCard(o) {
  const mins = Math.floor((Date.now() - new Date(o.created_at)) / 60000);
  let timerClass = '';
  if (mins >= 20) timerClass = 'late';
  else if (mins >= 12) timerClass = 'warn';
  const statusClass = o.status === 'accepted' ? 'new' : o.status === 'preparing' ? 'preparing' : 'ready';
  const items = (o.order_items || []).map(i => `
    <div class="item"><span class="item-qty">${i.quantity}×</span><span class="item-name">${i.menu_items?.name || 'Unknown'}</span></div>
    ${i.special_notes ? `<div class="item-note">↳ ${escapeHtml(i.special_notes)}</div>` : ''}`).join('');
  const customerInfo = o.order_type === 'delivery' ? `<div class="card-customer"><div>📦 ${escapeHtml(o.customer_name || '—')}</div><div>📞 ${escapeHtml(o.customer_phone || '—')}</div></div>` : '';
  const notes = o.notes ? `<div class="card-notes">📝 ${escapeHtml(o.notes)}</div>` : '';
  let actions = '';
  if (o.status === 'accepted') actions = `<button class="action-btn btn-prepare" onclick="updateStatus('${o.id}','preparing')">Bdit n-sa(h)bha</button>`;
  else if (o.status === 'preparing') actions = `<button class="action-btn btn-prepare-blue" onclick="updateStatus('${o.id}','ready')">Wjdat ✓</button>`;
  else if (o.status === 'ready') {
    const finalStatus = o.order_type === 'delivery' ? 'out_for_delivery' : 'delivered';
    const label = o.order_type === 'delivery' ? 'Ready l\'livreur' : 'Slemt l\'client';
    actions = `<button class="action-btn btn-ready" onclick="updateStatus('${o.id}','${finalStatus}')">${label}</button>`;
  }
  return `<div class="card ${statusClass}">
    <div class="card-head"><div class="card-num">#${o.order_number}</div><div class="card-type ${o.order_type}">${o.order_type.replace('_',' ')}</div></div>
    <div class="card-timer ${timerClass}">⏱ ${mins} min · ${o.total} MAD</div>
    ${customerInfo}${notes}
    <div class="items">${items}</div>
    <div class="actions">${actions}</div>
  </div>`;
}

function updateTimers() {
  document.querySelectorAll('.card').forEach((card, i) => {
    const sorted = [...orders].sort((a, b) => {
      const so = { 'accepted': 0, 'preparing': 1, 'ready': 2 };
      return so[a.status] - so[b.status] || new Date(a.created_at) - new Date(b.created_at);
    });
    const o = sorted[i];
    if (!o) return;
    const mins = Math.floor((Date.now() - new Date(o.created_at)) / 60000);
    const timerEl = card.querySelector('.card-timer');
    if (timerEl) {
      timerEl.textContent = `⏱ ${mins} min · ${o.total} MAD`;
      timerEl.className = 'card-timer' + (mins >= 20 ? ' late' : mins >= 12 ? ' warn' : '');
    }
  });
}

async function updateStatus(orderId, newStatus) {
  try {
    const updates = { status: newStatus };
    if (newStatus === 'ready') updates.ready_at = new Date().toISOString();
    if (newStatus === 'delivered') updates.delivered_at = new Date().toISOString();
    const { error } = await supabase.from('orders').update(updates).eq('id', orderId);
    if (error) throw error;
  } catch (e) { alert('Erreur: ' + e.message); }
}

function playNotification() {
  if (!soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 200].forEach(delay => {
      setTimeout(() => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 880; osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
      }, delay);
    });
  } catch (e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundBtn');
  btn.textContent = soundEnabled ? '🔔 Son: ON' : '🔕 Son: OFF';
  btn.classList.toggle('off', !soundEnabled);
  localStorage.setItem('sound_enabled', soundEnabled);
  if (soundEnabled) playNotification();
}

function showToast(title, body) {
  const el = document.createElement('div');
  el.className = 'notification';
  el.innerHTML = `<div style="font-size:14px;font-weight:500;margin-bottom:4px;">${title}</div><div style="font-size:13px;">${body}</div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function startClock() {
  function update() {
    const now = new Date();
    document.getElementById('clock').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  }
  update();
  setInterval(update, 30000);
}

soundEnabled = localStorage.getItem('sound_enabled') !== 'false';
if (!soundEnabled) {
  document.getElementById('soundBtn').textContent = '🔕 Son: OFF';
  document.getElementById('soundBtn').classList.add('off');
}

init();
</script>
</body>
</html>
